<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e5ba8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d7a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hexagonal frame with striped pattern -->
  <g transform="translate(250, 250)">
    <!-- Outer hexagon stripes -->
    <path d="M 0,-200 L 173.2,-100 L 173.2,100 L 0,200 L -173.2,100 L -173.2,-100 Z" 
          fill="none" stroke="url(#blueGradient)" stroke-width="30"/>
    <path d="M 0,-180 L 155.9,-90 L 155.9,90 L 0,180 L -155.9,90 L -155.9,-90 Z" 
          fill="none" stroke="#1e5ba8" stroke-width="25"/>
    <path d="M 0,-160 L 138.6,-80 L 138.6,80 L 0,160 L -138.6,80 L -138.6,-80 Z" 
          fill="none" stroke="url(#blueGradient)" stroke-width="20"/>
    
    <!-- Inner white hexagon -->
    <path d="M 0,-120 L 103.9,-60 L 103.9,60 L 0,120 L -103.9,60 L -103.9,-60 Z" 
          fill="white"/>
    
    <!-- Inner stripes -->
    <path d="M 0,-100 L 86.6,-50 L 86.6,50 L 0,100 L -86.6,50 L -86.6,-50 Z" 
          fill="none" stroke="#003d7a" stroke-width="15"/>
    <path d="M 0,-80 L 69.3,-40 L 69.3,40 L 0,80 L -69.3,40 L -69.3,-40 Z" 
          fill="none" stroke="#1e5ba8" stroke-width="12"/>
  </g>
</svg>